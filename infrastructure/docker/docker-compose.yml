version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: salam
      POSTGRES_PASSWORD: salam
      POSTGRES_DB: salam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salam"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  evidence-engine:
    build:
      context: .
      dockerfile: services/evidence-engine/Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://salam:salam@postgres:5432/salam
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
      DB_ECHO: "true"
      SERVICE_NAME: evidence-engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot reload in development
      - ./shared:/app/shared
      - ./services/evidence-engine:/app/services/evidence-engine

volumes:
  postgres_data:
